<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Master - UCAB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantalla-lobby">
        <h2>¡Bienvenido a UNO Master!</h2>
        <div class="form-group">
            <input type="text" id="username" placeholder="Escribe tu nickname...">
            <button id="btn-entrar" onclick="conectarAlLobby()">Entrar al Lobby</button>
        </div>
        <div id="sala-espera" style="display: none;">
            <h3>Jugadores en la sala (Esperando 4 participantes):</h3>
            <ul id="lista-jugadores"></ul>
        </div>
    </div>

    <div id="pantalla-juego" style="display: none;">
        <div class="info-barra">
            <span id="info-sentido">Sentido: ➡️</span> | 
            <span id="info-turno">Turno de: ---</span>
        </div>

        <div id="log-acciones">¡Esperando inicio!</div>

        <div class="tablero-central">
            <div class="area-mazo" onclick="robarCartaDelMazo()">
                <img src="card_back.png" alt="Mazo de Robo" class="carta-mazo">
                <p>Mazo (Robar)</p>
            </div>
            <div class="area-descarte">
                <div id="carta-mesa-contenedor">
                    </div>
                <p>Pozo de Descarte</p>
            </div>
        </div>

        <div id="botonera-uno" style="display: none;">
            <button class="btn-uno" onclick="gritarUno()">⚡ ¡CANTAR UNO!</button>
        </div>
        
        <div class="botonera-corte">
            <button class="btn-corte" onclick="gritarCorte()">🔥 ¡CANTAR CORTE!</button>
        </div>

        <h3>Tu Mano</h3>
        <div id="mis-cartas" class="contenedor-mano">
            </div>
    </div>

    <div id="modal-popup" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-titulo">¡Alerta del Juego!</h3>
            <p id="modal-mensaje">Te han penalizado.</p>
            <button onclick="aceptarPenalizacion()">Aceptar y Continuar</button>
        </div>
    </div>

    <div id="selector-color" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Selecciona un Color</h3>
            <div class="colores-grid">
                <button onclick="elegirColorComodin('Rojo')" style="background-color: #ff5555; color: white;">Rojo</button>
                <button onclick="elegirColorComodin('Amarillo')" style="background-color: #ffaa00; color: black;">Amarillo</button>
                <button onclick="elegirColorComodin('Verde')" style="background-color: #55aa55; color: white;">Verde</button>
                <button onclick="elegirColorComodin('Azul')" style="background-color: #5555ff; color: white;">Azul</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
